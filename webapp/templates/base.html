<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" href="/static/wikifx.png">
  <title>{% block title %}WikiFX 内容站群{% endblock %}</title>
  <style>
    :root {
      --bg: #f4f5f7; --surface: #ffffff; --surface2: #f5f6f8;
      --border: #e4e6ea; --border2: #d5d8de;
      --text: #1a1d21; --muted: #656c76; --faint: #9aa1ab;
      --accent: #2557d6; --accent-hover: #1e49b8; --accent-soft: #edf2fd;
      --ok: #1a8a4a; --ok-soft: #eaf6ee; --warn: #b8760a;
      --err: #cf3232; --err-soft: #fbecec;
      --shadow: 0 1px 2px rgba(20,28,40,.05);
      --radius: 8px;
      --sidebar-w: 256px;
    }
    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text);
      font-family: -apple-system, "Segoe UI", "Microsoft YaHei", system-ui, sans-serif;
      font-size: 14px; -webkit-font-smoothing: antialiased; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-hover); }

    /* ---------- 侧边栏：固定 ---------- */
    .sidebar { position: fixed; top: 0; left: 0; width: var(--sidebar-w); height: 100vh;
      background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; padding: 16px 12px; overflow-y: auto; z-index: 10; }
    .brand { display: flex; align-items: center; gap: 9px; font-weight: 650; font-size: 15px;
      color: var(--text); padding: 6px 8px 14px; }
    .brand img { width: 24px; height: 24px; border-radius: 5px; }
    .side-label { color: var(--faint); font-size: 11px; font-weight: 600; letter-spacing: .05em;
      padding: 14px 10px 6px; }
    .site-item { display: block; padding: 9px 11px; border-radius: 7px; color: var(--text);
      margin-bottom: 1px; line-height: 1.3; }
    .site-item:hover { background: var(--surface2); color: var(--text); }
    .site-item.active { background: var(--accent-soft); color: var(--accent-hover); font-weight: 600; }
    .site-item .meta { color: var(--faint); font-size: 11px; margin-top: 2px; font-weight: 400; }
    .site-item.active .meta { color: var(--accent); }
    .side-new { margin: 4px 6px; display: block; text-align: center; }
    .side-foot { margin-top: auto; padding: 12px 10px 2px; color: var(--faint); font-size: 11px;
      border-top: 1px solid var(--border); }

    /* ---------- 主区 ---------- */
    .main { margin-left: var(--sidebar-w); padding: 28px 36px; max-width: 1180px; }

    /* ---------- 组件 ---------- */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 20px 22px; margin-bottom: 16px; box-shadow: var(--shadow); }
    .card h2 { margin: 0 0 3px; font-size: 15px; font-weight: 620; }
    .card .sub { color: var(--muted); font-size: 12.5px; margin: 0 0 15px; }
    h1 { font-size: 21px; font-weight: 680; margin: 0; }

    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 13px 22px; }
    .field { display: flex; flex-direction: column; gap: 5px; }
    .field.full { grid-column: 1 / -1; }
    label { color: var(--muted); font-size: 12px; }
    input[type=text], input[type=password], input[type=number], select, textarea {
      background: var(--surface); color: var(--text); border: 1px solid var(--border2);
      border-radius: 6px; padding: 8px 10px; font-size: 14px; width: 100%; transition: border .12s, box-shadow .12s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft); }
    textarea { resize: vertical; min-height: 60px; font-family: inherit; }

    .btn { background: var(--accent); color: #fff; border: none; border-radius: 6px;
      padding: 8px 15px; font-size: 13.5px; font-weight: 500; cursor: pointer; transition: background .12s; }
    .btn:hover { background: var(--accent-hover); }
    .btn.secondary { background: var(--surface); border: 1px solid var(--border2); color: var(--text); }
    .btn.secondary:hover { background: var(--surface2); }
    .btn.ok { background: var(--ok); } .btn.ok:hover { filter: brightness(.94); }
    .btn.danger { background: var(--err); } .btn.danger:hover { filter: brightness(.94); }
    .btn.small { padding: 5px 10px; font-size: 12.5px; }

    .row { display: flex; align-items: center; gap: 11px; flex-wrap: wrap; }
    .spacer { flex: 1; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { text-align: left; padding: 9px 12px; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 12px; background: var(--surface2); }
    tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #fafbfc; }

    .pill { display: inline-block; padding: 2px 9px; border-radius: 4px; font-size: 12px; font-weight: 500; }
    .pill.pending { background: var(--surface2); color: #5a6572; }
    .pill.processing { background: #e8effc; color: #1e49b8; }
    .pill.done { background: var(--ok-soft); color: #157a41; }
    .pill.error { background: var(--err-soft); color: #b02a2a; }
    .pill.skipped { background: #f0f0f2; color: #5a6572; }
    .tag { display:inline-block; padding: 2px 9px; border-radius: 4px; font-size: 12px;
      background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }

    .muted { color: var(--muted); }
    .stat { display: inline-flex; flex-direction: column; gap: 3px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
      padding: 11px 18px; min-width: 78px; }
    .stat b { font-size: 21px; font-weight: 680; line-height: 1; }
    .stat span { color: var(--muted); font-size: 11.5px; }

    #logbox { background: #1b1f24; border: 1px solid #2a2f36; border-radius: 7px;
      padding: 13px 15px; height: 290px; overflow-y: auto; color: #c9d1d9;
      font-family: "Cascadia Code","Consolas",monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; }

    .banner { padding: 10px 15px; border-radius: 7px; margin-bottom: 14px; font-size: 13px; }
    .banner.ok { background: var(--ok-soft); color: #157a41; border: 1px solid #c7e6d1; }
    .banner.err { background: var(--err-soft); color: #b02a2a; border: 1px solid #f0cfcf; }

    .tabs { display: inline-flex; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 3px; gap: 3px; margin-bottom: 16px; }
    .tab { padding: 7px 17px; border-radius: 6px; cursor: pointer; font-size: 13.5px; font-weight: 500;
      color: var(--muted); border: none; background: transparent; }
    .tab.active { background: var(--surface); color: var(--text); box-shadow: var(--shadow); }
    .mode-panel { display: none; }
    .mode-panel.active { display: block; }
    .section-label { color: var(--text); font-weight: 600; font-size: 13px; }
  </style>
</head>
<body>
  <aside class="sidebar">
    <a href="/" class="brand"><img src="/static/wikifx.png" alt="WikiFX"> WikiFX 内容站群</a>
    <a href="/sites/new" class="btn small side-new">新建站点</a>
    <div class="side-label">站点</div>
    {% if sites is defined and sites %}
      {% for s in sites %}
      <a href="/sites/{{ s.id }}" class="site-item {% if site is defined and site and site.id == s.id %}active{% endif %}">
        {{ s.name }}
        <div class="meta">{{ s.language }} · {{ "发布" if s.publish_status == "publish" else "草稿" }}</div>
      </a>
      {% endfor %}
    {% else %}
      <div class="muted" style="padding:8px 10px;font-size:12px">还没有站点</div>
    {% endif %}
    <div class="side-foot">内容生产后台</div>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
